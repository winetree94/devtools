name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: >-
          node --input-type=module -e 'import pkg from "./package.json" with {
          type: "json" }; const tag = process.env.GITHUB_REF_NAME; const
          expectedTag = `v${pkg.version}`; if (tag !== expectedTag) {
          console.error(`Tag ${tag} does not match package.json version
          ${expectedTag}`); process.exit(1); }'

      - name: Run validation
        run: npm run check

      - name: Verify published package contents
        run: npm pack --dry-run

      - name: Publish package to npm
        run: npm publish --provenance --access public
